<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Demo Website</title>

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2YZ1DL133S"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-2YZ1DL133S');
</script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 32px;
        }

        p {
            font-size: 18px;
            max-width: 600px;
            margin: auto;
        }

        button {
            margin: 15px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            color: #333;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
            color: white;
        }

        .counter {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Website Analytics Demo</h1>

    <p>
        This is a website to get analysis of website just by opening or reviewing it by different users.
        And I will get analysis by connecting it with Google Analytics.
    </p>

    <button onclick="trackClick()">Click Me</button>
    <button onclick="refreshPage()">Refresh Page</button>

    <div class="counter">
        Click Count: <span id="count">0</span>
    </div>
</div>

<script>
    let count = 0;

    function trackClick() {
        count++;
        document.getElementById("count").innerText = count;

        // Send event to Google Analytics
        gtag('event', 'button_click', {
            'event_category': 'engagement',
            'event_label': 'click_button'
        });
    }

    function refreshPage() {
        location.reload();
    }
</script>

</body>
</html>
