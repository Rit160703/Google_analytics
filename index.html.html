<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Demo Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 32px;
        }

        p {
            max-width: 600px;
            margin: auto;
            font-size: 18px;
        }

        a.button {
            display: inline-block;
            margin: 15px;
            padding: 12px 25px;
            background: white;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        a.button:hover {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Website Analytics Demo</h1>

    <p>
        This is a website to get analysis of website just by opening or reviewing it by different users.
        And I will get analysis by connecting it with Google Analytics.
    </p>

    <!-- Fake click interaction -->
    <a href="#" class="button">Click Me</a>

    <!-- Refresh button -->
    <a href="" class="button">Refresh Page</a>

</div>

</body>
</html>
